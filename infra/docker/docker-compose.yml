# Local development stack — Postgres + pgvector, Redis, Redpanda.
# Brought up by `scripts/dev-up.ps1` or directly: `docker compose up -d`.

services:
  postgres:
    # pgvector-enabled Postgres image. Matches Supabase free-tier capabilities.
    image: pgvector/pgvector:pg16
    container_name: ledgerline-postgres
    environment:
      POSTGRES_USER: ledgerline
      POSTGRES_PASSWORD: ledgerline
      POSTGRES_DB: ledgerline
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerline"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ledgerline-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    # Single-binary Kafka-compatible broker. Matches the production M14 deploy.
    image: redpandadata/redpanda:v24.3.1
    container_name: ledgerline-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
      - --smp=1
      - --memory=1G
      - --mode=dev-container
      - --default-log-level=warn
    ports:
      - "19092:19092"    # Kafka external
      - "18082:18082"    # Pandaproxy external
      - "18081:18081"    # Schema registry external
      - "9644:9644"      # Admin API
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health -X brokers=localhost:9092 | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Redpanda Console — web UI for inspecting topics + consumers.
  # Optional but very useful during development.
  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: ledgerline-redpanda-console
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8088:8080"

volumes:
  postgres-data:
  redis-data:
  redpanda-data:
